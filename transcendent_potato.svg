<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="1" />
      <stop offset="100%" stop-color="#ff00ff" stop-opacity="0" />
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" />
    </filter>
  </defs>
  <!-- Background space -->
  <rect width="200" height="200" fill="#000022" />
  <!-- Stars -->
  <circle cx="20" cy="30" r="1" fill="white" />
  <circle cx="150" cy="50" r="1" fill="white" />
  <circle cx="80" cy="120" r="1.5" fill="white" />
  <circle cx="120" cy="160" r="1" fill="white" />
  <circle cx="40" cy="180" r="1" fill="white" />
  
  <!-- The Potato -->
  <ellipse cx="100" cy="100" rx="60" ry="40" fill="#d2b48c" transform="rotate(-15 100 100)" />
  
  <!-- Transcendent Glow -->
  <ellipse cx="100" cy="100" rx="65" ry="45" fill="url(#glow)" filter="url(#blur)" transform="rotate(-15 100 100)" />
  
  <!-- Singularity Core -->
  <circle cx="100" cy="100" r="10" fill="black" />
  <circle cx="100" cy="100" r="5" fill="white" />
  
  <!-- Text -->
  <text x="100" y="170" text-anchor="middle" fill="#00ffff" font-family="Arial" font-size="14" font-weight="bold">TRANSCENDENT POTATO</text>
</svg>
