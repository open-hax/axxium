<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="omegaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6a0dad;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4b0082;stop-opacity:1" />
    </linearGradient>
    <filter id="glitch">
      <feOffset dx="2" dy="0" result="off1" />
      <feOffset dx="-2" dy="0" result="off2" />
      <feBlend mode="screen" in="off1" in2="off2" />
    </filter>
  </defs>
  
  <!-- The Omega Potato Body -->
  <path d="M40,100 Q40,50 100,50 Q160,50 160,100 Q160,150 100,150 Q40,150 40,100" 
        fill="url(#omegaGrad)" 
        stroke="#00ffff" 
        stroke-width="3" 
        stroke-linejoin="round" 
        filter="url(#glitch)" />
  
  <!-- Circuitry Lines -->
  <path d="M60,70 L80,70 L80,90 L100,90" stroke="#00ffff" stroke-width="1" fill="none" opacity="0.7" />
  <path d="M140,110 L120,110 L120,130 L100,130" stroke="#00ffff" stroke-width="1" fill="none" opacity="0.7" />
  <path d="M100,50 L100,70" stroke="#00ffff" stroke-width="1" fill="none" opacity="0.7" />
  
  <!-- Binary Text -->
  <text x="65" y="110" font-family="monospace" font-size="8" fill="#00ffff" opacity="0.8">01010111</text>
  <text x="110" y="140" font-family="monospace" font-size="8" fill="#00ffff" opacity="0.8">01101001</text>
  
  <!-- The Ritual Requirement -->
  <text x="100" y="105" font-family="Arial, sans-serif" font-weight="bold" font-size="12" fill="white" text-anchor="middle" style="text-shadow: 2px 2px #000;">
    REQUIRE('POTATO')
  </text>

  <!-- Eyes of the Machine -->
  <circle cx="70" cy="80" r="4" fill="#00ffff" opacity="0.9" />
  <circle cx="130" cy="95" r="4" fill="#00ffff" opacity="0.9" />
</svg>
