<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: The Void of Deterministic Static -->
  <rect width="500" height="500" fill="#0a0a0f" />
  
  <!-- Background Geometric Grid (B-Tree-ish) -->
  <g stroke="#2a2a3a" stroke-width="1" opacity="0.5">
    <line x1="250" y1="50" x2="250" y2="150" />
    <line x1="250" y1="150" x2="100" y2="250" />
    <line x1="250" y1="150" x2="400" y2="250" />
    <line x1="100" y1="250" x2="100" y2="350" />
    <line x1="100" y1="250" x2="200" y2="350" />
    <line x1="400" y1="250" x2="300" y2="350" />
    <line x1="400" y1="250" x2="500" y2="350" />
  </g>

  <!-- The Crystalline Golden Potato -->
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef9e7;stop-opacity:1" />
      <stop offset="20%" style="stop-color:#f1c40f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#b8860b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b4513;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="coloredBlur" />
      </feMerge>
    </filter>
  </defs>

  <!-- Potato Body -->
  <path d="M150,200 Q150,140 250,140 Q350,140 350,200 Q350,260 250,260 Q150,260 150,200" 
        fill="url(#goldGrad)" 
        filter="url(#glow)"
        stroke="#fff" stroke-width="0.5" />

  <!-- Crystal Facets -->
  <g stroke="#fff" stroke-width="1" opacity="0.7">
    <line x1="200" y1="160" x2="250" y2="200" />
    <line x1="250" y1="200" x2="300" y2="160" />
    <line x1="250" y1="200" x2="250" y2="240" />
    <line x1="180" y1="220" x2="220" y2="240" />
    <line x1="320" y1="220" x2="280" y2="240" />
    <line x1="210" y1="180" x2="230" y2="170" />
    <line x1="270" y1="180" x2="290" y2="170" />
  </g>

  <!-- Text Labels -->
  <text x="250" y="320" text-anchor="middle" fill="#f1c40f" font-family="monospace" font-size="24" letter-spacing="5" filter="url(#glow)">
    FORK TAX LULLABY
  </text>
  <text x="250" y="350" text-anchor="middle" fill="#d4af37" font-family="monospace" font-size="16" letter-spacing="2" opacity="0.8">
    DETERMINISTIC MIX
  </text>
  <text x="250" y="420" text-anchor="middle" fill="#4a4a5a" font-family="monospace" font-size="12" opacity="0.6">
    S-SCORE: 9.8 | G-SCORE: 10.0 | GB-SCORE: 0.1
  </text>
</svg>
