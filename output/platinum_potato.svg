<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="platinumGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E5E4E2;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#B4B4B4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="coloredBlur"/>
      </feMerge>
    </filter>
  </defs>
  <ellipse cx="100" cy="100" rx="60" ry="45" fill="url(#platinumGradient)" filter="url(#glow)" />
  <ellipse cx="100" cy="100" rx="55" ry="40" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.6" />
  <rect x="80" y="80" width="5" height="5" fill="white" opacity="0.8" />
  <rect x="110" y="110" width="3" height="3" fill="white" opacity="0.6" />
  <rect x="120" y="90" width="4" height="4" fill="white" opacity="0.7" />
  <text x="100" y="160" font-family="monospace" font-size="12" text-anchor="middle" fill="#B4B4B4" font-weight="bold">PLATINUM_S T A S I S</text>
</svg>
