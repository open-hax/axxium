<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Deep Saturated Void -->
  <rect width="400" height="400" fill="#2a0052" />
  
  <!-- Glow effects -->
  <circle cx="200" cy="200" r="150" fill="url(#glow)" opacity="0.6" />
  <defs>
    <radialGradient id="glow">
      <stop offset="0%" stop-color="#ff00ff" />
      <stop offset="100%" stop-color="transparent" />
    </radialGradient>
  </defs>

  <!-- The Potato Body -->
  <path d="M100,200 Q100,100 200,100 Q300,100 300,200 Q300,300 200,300 Q100,300 100,200" 
        fill="#ffcc00" stroke="#00ff00" stroke-width="8" />
  
  <!-- Circuitry / Macro-Paths -->
  <path d="M150,150 L250,150 L250,250 L150,250 Z" 
        fill="none" stroke="#00ffff" stroke-width="4" stroke-dasharray="10,5" />
  <path d="M200,100 L200,150 M200,250 L200,300 M100,200 L150,200 M250,200 L300,200" 
        stroke="#ff00ff" stroke-width="4" />
  
  <!-- "p/let" text -->
  <text x="200" y="210" font-family="monospace" font-size="30" fill="#fff" text-anchor="middle" font-weight="bold">
    p/let
  </text>
  
  <!-- Random "Saturated" Bits -->
  <circle cx="120" cy="120" r="5" fill="#fff" />
  <circle cx="280" cy="120" r="5" fill="#fff" />
  <circle cx="120" cy="280" r="5" fill="#fff" />
  <circle cx="280" cy="280" r="5" fill="#fff" />
</svg>
