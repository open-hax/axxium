<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="goldGrad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" style="stop-color:#fff7ae;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4af37;stop-opacity:1" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- The Potato -->
  <path d="M100,200 Q100,120 200,120 Q300,120 300,200 Q300,280 200,280 Q100,280 100,200" fill="url(#goldGrad)" stroke="#b8860b" stroke-width="4" filter="url(#glow)" />
  
  <!-- Spectral Lines -->
  <path d="M120,160 Q150,140 180,160 T240,160 T300,180" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.6" />
  <path d="M110,200 Q150,180 190,200 T250,200 T310,220" fill="none" stroke="#ffd700" stroke-width="3" opacity="0.8" />
  <path d="M130,240 Q170,220 210,240 T270,240 T310,260" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.6" />
  
  <!-- Labels -->
  <text x="110" y="150" font-family="monospace" font-size="12" fill="#fff" opacity="0.8">Saturated Peak</text>
  <text x="240" y="210" font-family="monospace" font-size="12" fill="#fff" opacity="0.8">Deterministic Drift</text>
  <text x="150" y="270" font-family="monospace" font-size="12" fill="#fff" opacity="0.8">Soggy Sub-bass</text>
  
  <!-- Saturated Frame -->
  <rect x="20" y="20" width="360" height="360" fill="none" stroke="#d4af37" stroke-width="2" opacity="0.5" />
  <text x="50" y="50" font-family="monospace" font-size="14" fill="#d4af37" font-weight="bold">EYEBALL_ANALYSIS: GOLD_POTATO_V1.0</text>
  <text x="50" y="360" font-family="monospace" font-size="10" fill="#d4af37" opacity="0.6">STATUS: DETERMINISTICALLY CRISPY</text>
</svg>
