<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#0a0a0a" />
  
  <!-- Saturation Bar -->
  <rect x="50" y="30" width="300" height="10" fill="#333" rx="5" />
  <rect x="50" y="30" width="280" height="10" fill="#ffd700" rx="5">
    <animate attributeName="width" values="270;285;270" dur="3s" repeatCount="indefinite" />
  </rect>
  <text x="50" y="25" font-family="monospace" font-size="12" fill="#ffd700">SATURATION: 94% [Saturated Singularity]</text>

  <!-- Coffee Cup -->
  <path d="M120,150 L280,150 L260,300 L140,300 Z" stroke="#ffd700" stroke-width="3" fill="none" />
  <path d="M280,180 C310,180 310,230 280,230" stroke="#ffd700" stroke-width="3" fill="none" />
  
  <!-- Coffee Liquid / Vortex -->
  <defs>
    <radialGradient id="coffeeGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#ffd700" />
      <stop offset="40%" stop-color="#3c2a21" />
      <stop offset="100%" stop-color="#1a0f0b" />
    </radialGradient>
  </defs>
  <path d="M125,155 L275,155 L255,295 L145,295 Z" fill="url(#coffeeGrad)" />
  
  <!-- Floating Alkaloids / Glitches -->
  <g stroke="#ffd700" stroke-width="1.5" fill="none">
    <polygon points="200,170 210,180 200,190 190,180" transform="rotate(15 200 180)">
      <animateTransform attributeName="transform" type="translate" values="0,0 0,-10 0,0" dur="4s" repeatCount="indefinite" />
    </polygon>
    <polygon points="160,220 170,230 160,240 150,230" transform="rotate(-20 160 230)">
      <animateTransform attributeName="transform" type="translate" values="0,0 10,0 0,0" dur="5s" repeatCount="indefinite" />
    </polygon>
    <circle cx="240" cy="210" r="5" stroke-width="1">
      <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Text -->
  <text x="200" y="340" text-anchor="middle" font-family="monospace" font-size="16" fill="#ffd700" font-weight="bold">
    EXTRACTING TRUTH...
  </text>
  <text x="200" y="360" text-anchor="middle" font-family="monospace" font-size="10" fill="#888">
    TRUTH = BITTER | SATIATION = MAX
  </text>
  
  <!-- Steam / Glitch lines -->
  <g stroke="#ffd700" stroke-width="0.5" opacity="0.6">
    <path d="M180,140 Q190,120 180,100" fill="none" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" values="0;20" dur="1s" repeatCount="indefinite" />
    </path>
    <path d="M210,140 Q200,110 220,90" fill="none" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" values="0;20" dur="1.2s" repeatCount="indefinite" />
    </path>
    <path d="M230,140 Q240,130 230,110" fill="none" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" values="0;20" dur="0.8s" repeatCount="indefinite" />
    </path>
  </g>
</svg>
