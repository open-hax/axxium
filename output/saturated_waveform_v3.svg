<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#1a1a1a" />
  <!-- Background Grid -->
  <path d="M 0 100 L 800 100 M 0 200 L 800 200 M 0 300 L 800 300" stroke="#333" stroke-width="1" />
  <path d="M 100 0 L 100 400 M 200 0 L 200 400 M 300 0 L 300 400 M 400 0 L 400 400 M 500 0 L 500 400 M 600 0 L 600 400 M 700 0 L 700 400" stroke="#333" stroke-width="1" />
  
  <!-- The "Saturated Waveform" - basically a golden brick -->
  <rect x="100" y="100" width="600" height="200" fill="url(#grad1)" stroke="#ffd700" stroke-width="4" />
  
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8860b;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Glitch Overlays -->
  <line x1="100" y1="120" x2="700" y2="120" stroke="#fff" stroke-width="1" opacity="0.5" />
  <line x1="100" y1="280" x2="700" y2="280" stroke="#fff" stroke-width="1" opacity="0.5" />
  <rect x="300" y="90" width="20" height="220" fill="#fff" opacity="0.3" />
  <rect x="500" y="90" width="10" height="220" fill="#fff" opacity="0.2" />
  
  <!-- Labels -->
  <text x="400" y="50" font-family="monospace" font-size="24" fill="#ffd700" text-anchor="middle">S A T U R A T E D _ W A V E F O R M</text>
  <text x="400" y="350" font-family="monospace" font-size="14" fill="#888" text-anchor="middle">CALORIC DENSITY: CRITICAL | STATUS: GOLD-LEAFED BRICK</text>
  <text x="110" y="115" font-family="monospace" font-size="10" fill="#fff" opacity="0.6">PEAK: +∞ dB</text>
  <text x="650" y="290" font-family="monospace" font-size="10" fill="#fff" opacity="0.6">FLOOR: STARCH</text>
</svg>
