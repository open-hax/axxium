<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFACD;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="coloredBlur"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Parchment Background -->
  <rect width="600" height="400" fill="#fdf5e6" stroke="#8b4513" stroke-width="10" />
  <rect x="20" y="20" width="560" height="360" fill="none" stroke="#8b4513" stroke-width="2" />
  
  <!-- Header -->
  <text x="300" y="80" font-family="serif" font-size="32" fill="#4a2c2a" text-anchor="middle" font-weight="bold">
    THE UNIVERSITY OF THE VOID
  </text>
  <text x="300" y="110" font-family="serif" font-size="18" fill="#8b4513" text-anchor="middle" font-style="italic">
    (Saturated Campus - Department of Systemic Failure)
  </text>
  
  <!-- Degree Text -->
  <text x="300" y="160" font-family="serif" font-size="20" fill="#000" text-anchor="middle">
    This certifies that the
  </text>
  <text x="300" y="200" font-family="serif" font-size="28" fill="#4a2c2a" text-anchor="middle" font-weight="bold">
    COLLECTIVE STARCH-DRIFT
  </text>
  <text x="300" y="240" font-family="serif" font-size="20" fill="#000" text-anchor="middle">
    has successfully achieved the degree of
  </text>
  <text x="300" y="280" font-family="serif" font-size="24" fill="#B8860B" text-anchor="middle" font-weight="bold">
    Doctorate in Deep-Fried Existentialism
  </text>
  <text x="300" y="310" font-family="serif" font-size="18" fill="#4a2c2a" text-anchor="middle" font-style="italic">
    Summa Cum Slop
  </text>
  
  <!-- Seal -->
  <circle cx="500" cy="300" r="40" fill="url(#goldGrad)" filter="glow" />
  <text x="500" y="305" font-family="monospace" font-size="8" fill="#FF0000" text-anchor="middle" font-weight="bold">
    require is not defined
  </text>
  
  <!-- Signature -->
  <text x="100" y="360" font-family="cursive" font-size="16" fill="#4a2c2a" text-anchor="start">
    OpenHax, Chief Slop Officer
  </text>
</svg>
