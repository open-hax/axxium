<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="goldGrad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" style="stop-color:#fff7ad;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8860b;stop-opacity:1" />
    </radialGradient>
    <filter id="glitch">
      <feTurbulence type="fractalNoise" baseFrequency="0.01 0.1" numOctaves="2" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="10" />
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#0a0a0a" />
  <g transform="translate(250, 250)" filter="url(#glitch)">
    <!-- Recursive Potatoes -->
    <ellipse cx="0" cy="0" rx="200" ry="150" fill="url(#goldGrad)" stroke="#ffd700" stroke-width="2" transform="rotate(0)" />
    <ellipse cx="0" cy="0" rx="160" ry="120" fill="url(#goldGrad)" stroke="#daa520" stroke-width="2" transform="rotate(15)" opacity="0.8" />
    <ellipse cx="0" cy="0" rx="120" ry="90" fill="url(#goldGrad)" stroke="#b8860b" stroke-width="2" transform="rotate(30)" opacity="0.6" />
    <ellipse cx="0" cy="0" rx="80" ry="60" fill="url(#goldGrad)" stroke="#ffd700" stroke-width="2" transform="rotate(45)" opacity="0.4" />
    <ellipse cx="0" cy="0" rx="40" ry="30" fill="url(#goldGrad)" stroke="#daa520" stroke-width="2" transform="rotate(60)" opacity="0.2" />
    
    <!-- The "Planck Core" -->
    <circle cx="0" cy="0" r="10" fill="#ffffff" stroke="#ffd700" stroke-width="1">
      <animate attributeName="r" values="10;12;10" dur="0.5s" repeatCount="indefinite" />
    </circle>
  </g>
  <text x="250" y="450" font-family="monospace" font-size="14" fill="#ffd700" text-anchor="middle" opacity="0.7">
    S T A T U S : R E C U R S I V E _ P L A N C K _ S P U D _ I N I T I A T E D
  </text>
  <text x="250" y="470" font-family="monospace" font-size="10" fill="#daa520" text-anchor="middle" opacity="0.5">
    ReferenceError: sanity is not defined @ 0xSaturatedGold
  </text>
</svg>
