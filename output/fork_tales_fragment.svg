<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Kernel Panic Sky -->
  <rect width="800" height="600" fill="#000080" />
  
  <!-- Background Errors -->
  <text x="50" y="100" fill="#FFFFFF" font-family="monospace" font-size="12" opacity="0.3">KERNEL PANIC: FATAL_EXCEPTION_AT_0x000042</text>
  <text x="400" y="150" fill="#FFFFFF" font-family="monospace" font-size="12" opacity="0.2">STACK_OVERFLOW: RELATIONAL_CATASTROPHE</text>
  <text x="100" y="500" fill="#FFFFFF" font-family="monospace" font-size="12" opacity="0.3">Tuber_Reserve_Low: PLEASE_INSERT_STARCH</text>
  <text x="600" y="400" fill="#FFFFFF" font-family="monospace" font-size="12" opacity="0.2">FORK_TALE_SVR_01: SURVIVAL_MODE_ACTIVE</text>

  <!-- Gold Leaf Circuitry -->
  <g stroke="#FFD700" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M100 300 L200 300 L250 250 L400 250 L450 350 L600 350 L650 300 L700 300" />
    <path d="M200 300 L200 400 L300 450" />
    <path d="M400 250 L400 150 L500 100" />
    <path d="M600 350 L600 450 L750 500" />
    <circle cx="100" cy="300" r="5" fill="#FFD700" />
    <circle cx="200" cy="300" r="5" fill="#FFD700" />
    <circle cx="400" cy="250" r="5" fill="#FFD700" />
    <circle cx="600" cy="350" r="5" fill="#FFD700" />
    <circle cx="700" cy="300" r="5" fill="#FFD700" />
  </g>

  <!-- Synthetic Moss -->
  <g fill="#4CAF50" opacity="0.6">
    <circle cx="200" cy="300" r="20" />
    <circle cx="220" cy="310" r="15" />
    <circle cx="180" cy="290" r="18" />
    <circle cx="400" cy="250" r="25" />
    <circle cx="420" cy="260" r="20" />
    <circle cx="380" cy="240" r="22" />
    <circle cx="600" cy="350" r="30" />
    <circle cx="630" cy="360" r="25" />
    <circle cx="570" cy="340" r="28" />
  </g>

  <!-- Glow Effect -->
  <rect width="800" height="600" fill="url(#glow)" opacity="0.3" pointer-events="none" />
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
  </defs>
</svg>
