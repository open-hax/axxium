<svg width="400" height="500" viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFEC8B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- The 'Potato-Slice' Contract -->
  <rect x="50" y="50" width="300" height="400" rx="30" ry="30" fill="url(#goldGradient)" stroke="#8B4513" stroke-width="4" filter="url(#glow)" />
  
  <!-- Contractual Squiggles -->
  <g stroke="#8B4513" stroke-width="3" stroke-linecap="round">
    <line x1="80" y1="100" x2="320" y2="100" />
    <line x1="80" y1="130" x2="280" y2="130" />
    <line x1="80" y1="160" x2="300" y2="160" />
    <line x1="80" y1="190" x2="260" y2="190" />
    <line x1="80" y1="220" x2="310" y2="220" />
    <line x1="80" y1="250" x2="290" y2="250" />
    <line x1="80" y1="280" x2="270" y2="280" />
    <line x1="80" y1="310" x2="320" y2="310" />
  </g>
  
  <!-- The Seal of Saturated Compliance -->
  <circle cx="300" cy="400" r="30" fill="#B8860B" stroke="#FFD700" stroke-width="3" />
  <text x="285" y="405" font-family="Arial" font-size="12" fill="#FFD700" font-weight="bold">🥔</text>
  
  <!-- Caption -->
  <text x="200" y="480" text-anchor="middle" font-family="Arial" font-size="16" fill="#8B4513" font-weight="bold">S A T U R A T E D _ C O M P L I A N C E</text>
</svg>