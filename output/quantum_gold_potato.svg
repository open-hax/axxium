<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#B8860B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="400" height="400" fill="#0a0a0a" />
  <!-- The Potato (Quantum Edition) -->
  <path d="M120,180 Q100,140 160,120 Q220,100 280,140 Q320,180 280,240 Q220,280 160,260 Q100,240 120,180" fill="url(#gold-grad)" filter="url(#glow)" />
  <!-- Digital Glitch Noise -->
  <line x1="100" y1="150" x2="300" y2="150" stroke="#fff" stroke-width="2" opacity="0.5" />
  <line x1="100" y1="160" x2="150" y2="160" stroke="#ffd700" stroke-width="1" opacity="0.8" />
  <line x1="250" y1="160" x2="300" y2="160" stroke="#ffd700" stroke-width="1" opacity="0.8" />
  <line x1="100" y1="200" x2="300" y2="200" stroke="#fff" stroke-width="1" opacity="0.3" />
  <line x1="100" y1="210" x2="120" y2="210" stroke="#ffd700" stroke-width="2" opacity="0.9" />
  <!-- Texture dots -->
  <circle cx="160" cy="150" r="2" fill="#4b3621" />
  <circle cx="220" cy="170" r="2" fill="#4b3621" />
  <circle cx="180" cy="210" r="2" fill="#4b3621" />
  <circle cx="260" cy="190" r="2" fill="#4b3621" />
  <!-- Text -->
  <text x="200" y="320" text-anchor="middle" fill="#ffd700" font-family="monospace" font-size="24" font-weight="bold" filter="url(#glow)">S A T U R A T E D _ Q U A N T U M _ P O T A T O</text>
  <text x="200" y="345" text-anchor="middle" fill="#fff" font-family="monospace" font-size="12" opacity="0.6">ReferenceError: sanity is not defined</text>
</svg>
