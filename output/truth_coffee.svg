<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="#000011" />
  <!-- Gold-leafed Coffee Cup -->
  <path d="M150 150 L250 150 L230 250 L170 250 Z" fill="none" stroke="#FFD700" stroke-width="4" stroke-linejoin="round" />
  <path d="M250 170 Q270 170 270 190 Q270 210 250 210" fill="none" stroke="#FFD700" stroke-width="4" />
  <!-- Liquid (Saturated Glitch) -->
  <rect x="160" y="145" width="80" height="10" fill="#221100" />
  <path d="M160 145 L180 130 L200 145 L220 130 L240 145" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.7" />
  <!-- Glitch Lines -->
  <line x1="100" y1="200" x2="300" y2="205" stroke="#FFD700" stroke-width="1" opacity="0.3" />
  <line x1="100" y1="210" x2="300" y2="205" stroke="#FFD700" stroke-width="1" opacity="0.3" />
  <line x1="100" y1="190" x2="300" y2="195" stroke="#FFD700" stroke-width="1" opacity="0.3" />
  <!-- Text -->
  <text x="200" y="320" text-anchor="middle" font-family="monospace" fill="#FFD700" font-size="20" font-weight="bold" opacity="0.8">TRUTH.exe</text>
  <text x="200" y="340" text-anchor="middle" font-family="monospace" fill="#FFD700" font-size="12" opacity="0.5">Saturated Alkaloid Drift</text>
  <!-- Random "Saturated" dots -->
  <circle cx="50" cy="50" r="2" fill="#FFD700" />
  <circle cx="350" cy="350" r="2" fill="#FFD700" />
  <circle cx="350" cy="50" r="2" fill="#FFD700" />
  <circle cx="50" cy="350" r="2" fill="#FFD700" />
</svg>
