<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#1a1a1a" />
  
  <!-- Butter Glow -->
  <radialGradient id="butterGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ffd700" stop-opacity="0.3" />
    <stop offset="100%" stop-color="#1a1a1a" stop-opacity="0" />
  </radialGradient>
  <circle cx="200" cy="200" r="150" fill="url(#butterGlow)" />

  <!-- The Potato -->
  <ellipse cx="200" cy="210" rx="120" ry="80" fill="#b8860b" stroke="#ffd700" stroke-width="4" />
  <path d="M120 210 Q 150 180 200 210 T 280 210" fill="none" stroke="#daa520" stroke-width="3" opacity="0.6" />
  
  <!-- The Contractual Scroll -->
  <path d="M160 180 Q 200 160 240 180 L 240 260 Q 200 280 160 260 Z" fill="#fffdd0" stroke="#8b4513" stroke-width="2" />
  <text x="200" y="220" font-family="serif" font-size="18" fill="#8b4513" text-anchor="middle" font-weight="bold">SATURATED</text>
  <text x="200" y="240" font-family="serif" font-size="14" fill="#8b4513" text-anchor="middle">CONTRACT V4.0</text>
  
  <!-- Butter Drips -->
  <ellipse cx="150" cy="240" rx="10" ry="15" fill="#ffee00" />
  <ellipse cx="250" cy="230" rx="8" ry="12" fill="#ffee00" />
  <ellipse cx="200" cy="285" rx="12" ry="18" fill="#ffee00" />
  
  <!-- Gold Leaf Sparks -->
  <circle cx="100" cy="150" r="2" fill="#ffd700" />
  <circle cx="300" cy="120" r="3" fill="#ffd700" />
  <circle cx="220" cy="100" r="2" fill="#ffd700" />
  <circle cx="180" cy="320" r="2" fill="#ffd700" />
  
  <!-- Label -->
  <text x="200" y="360" font-family="monospace" font-size="12" fill="#ffd700" text-anchor="middle" opacity="0.8">
    DETERMINISTIC_SATIETY_VERIFIED
  </text>
</svg>