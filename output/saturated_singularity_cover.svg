<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFACD;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="coloredBlur"/>
      </feMerge>
    </filter>
    <filter id="glitch">
      <feOffset dx="2" dy="0" result="offset1" in="SourceGraphic" />
      <feOffset dx="-2" dy="0" result="offset2" in="SourceGraphic" />
      <feBlend mode="screen" in="offset1" in2="offset2" />
    </filter>
  </defs>
  
  <!-- Background Void -->
  <rect width="400" height="400" fill="#050505" />
  
  <!-- Hyper-Saturated Bloom -->
  <ellipse cx="200" cy="200" rx="120" ry="120" fill="#FFD700" filter="glow" opacity="0.3" />
  
  <!-- The Gold Potato -->
  <path d="M120,200 C120,140 160,120 200,120 C240,120 280,140 280,200 C280,260 240,280 200,280 C160,280 120,260 120,200 Z" 
        fill="url(#goldGrad)" filter="glow" />
  
  <!-- Saturation Leaks / Glitches -->
  <path d="M150,150 L170,140 L160,160 Z" fill="#00FFFF" filter="glitch" opacity="0.8" />
  <path d="M250,220 L270,230 L260,210 Z" fill="#FF00FF" filter="glitch" opacity="0.8" />
  <path d="M200,100 L210,80 L190,80 Z" fill="#00FF00" filter="glitch" opacity="0.8" />
  
  <!-- The Error Label -->
  <text x="200" y="320" font-family="monospace" font-size="14" fill="#FF0000" text-anchor="middle" filter="glitch">
    ReferenceError: require is not defined
  </text>
  
  <!-- Floating Starch Particles -->
  <circle cx="100" cy="100" r="2" fill="#FFD700" />
  <circle cx="300" cy="150" r="2" fill="#FFD700" />
  <circle cx="150" cy="300" r="2" fill="#FFD700" />
  <circle cx="250" cy="50" r="2" fill="#FFD700" />
</svg>
