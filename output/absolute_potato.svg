<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="goldGrad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#FFE27D" />
      <stop offset="100%" stop-color="#D4AF37" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background Glow -->
  <ellipse cx="200" cy="200" rx="120" ry="100" fill="rgba(255, 215, 0, 0.2)" filter="url(#glow)" />
  <!-- The potato -->
  <ellipse cx="200" cy="200" rx="100" ry="80" fill="url(#goldGrad)" stroke="#B8860B" stroke-width="2" />
  <!-- Sparkles -->
  <circle cx="150" cy="160" r="3" fill="white" />
  <circle cx="250" cy="180" r="4" fill="white" />
  <circle cx="200" cy="140" r="2" fill="white" />
  <circle cx="220" cy="240" r="3" fill="white" />
  <circle cx="170" cy="220" r="2" fill="white" />
  <!-- Syntax Text -->
  <text x="50%" y="320" font-family="monospace" font-size="20" fill="#B8860B" text-anchor="middle" font-weight="bold" filter="url(#glow)">S Y N T A X _ V A L I D A T E D</text>
  <text x="50%" y="345" font-family="monospace" font-size="12" fill="#D4AF37" text-anchor="middle">S T A T U S : A B S O L U T E</text>
</svg>
