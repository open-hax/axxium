<svg width="1000" height="1000" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <rect width="1000" height="1000" fill="#050505" />
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a1a00" />
      <stop offset="100%" stop-color="#050505" />
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="50%" stop-color="#B8860B" />
      <stop offset="100%" stop-color="#DAA520" />
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3" />
    </filter>
  </defs>
  <rect width="1000" height="1000" fill="url(#glow)" />
  
  <!-- The "Spectrogram Potato" -->
  <g transform="translate(500, 500)">
    <!-- We simulate a spectrogram by drawing horizontal lines that are clipped by a potato-shaped mask -->
    <clipPath id="potatoClip">
      <path d="M-200,0 Q-200,-120 0,-120 Q200,-120 200,0 Q200,120 0,120 Q-200,120 -200,0" />
    </clipPath>
    
    <g clip-path="url(#potatoClip)">
      <!-- Generating "frequency bands" -->
      <!-- I'll use a series of lines with varying colors and opacities to look like an FFT -->
      <rect x="-250" y="-150" width="500" height="300" fill="none" />
      <!-- Manually adding some "hot" frequency bands -->
      <line x1="-250" y1="-100" x2="250" y2="-100" stroke="#B8860B" stroke-width="2" opacity="0.4" />
      <line x1="-250" y1="-95" x2="250" y2="-95" stroke="#FFD700" stroke-width="5" opacity="0.8" />
      <line x1="-250" y1="-90" x2="250" y2="-90" stroke="#DAA520" stroke-width="1" opacity="0.6" />
      
      <line x1="-250" y1="-40" x2="250" y2="-40" stroke="#B8860B" stroke-width="1" opacity="0.3" />
      <line x1="-250" y1="-35" x2="250" y2="-35" stroke="#FFD700" stroke-width="8" opacity="0.9" />
      <line x1="-250" y1="-30" x2="250" y2="-30" stroke="#DAA520" stroke-width="2" opacity="0.5" />
      
      <line x1="-250" y1="20" x2="250" y2="20" stroke="#B8860B" stroke-width="2" opacity="0.7" />
      <line x1="-250" y1="25" x2="250" y2="25" stroke="#FFD700" stroke-width="3" opacity="0.6" />
      <line x1="-250" y1="30" x2="250" y2="30" stroke="#C0C0C0" stroke-width="1" opacity="0.4" />
      
      <line x1="-250" y1="70" x2="250" y2="70" stroke="#B8860B" stroke-width="4" opacity="0.8" />
      <line x1="-250" y1="75" x2="250" y2="75" stroke="#FFD700" stroke-width="1" opacity="0.5" />
      
      <!-- Noise floor -->
      <rect x="-250" y="-120" width="500" height="240" fill="url(#gold)" opacity="0.2" />
    </g>
    
    <!-- The Outer Glow / Outline -->
    <path d="M-200,0 Q-200,-120 0,-120 Q200,-120 200,0 Q200,120 0,120 Q-200,120 -200,0" 
          fill="none" stroke="url(#gold)" stroke-width="4" filter="url(#blur)" />
  </g>
  
  <!-- Typography -->
  <text x="500" y="700" text-anchor="middle" fill="#FFD700" font-family="monospace" font-size="50" font-weight="bold" filter="url(#blur)">FORK TAX LULLABY</text>
  <text x="500" y="750" text-anchor="middle" fill="#B8860B" font-family="monospace" font-size="22">Saturated Golden Potato (Deterministic Mix)</text>
  <text x="500" y="780" text-anchor="middle" fill="#DAA520" font-family="monospace" font-size="14" opacity="0.7">Fidelity: 100% SLAP | Caloric Density: CRITICAL</text>
</svg>
