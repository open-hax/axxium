name: knoxx-pr-gate

on:
  pull_request:
    branches:
      - main
      - staging
    paths:
      # Submodule gitlinks (PRs that bump these pointers should run Knoxx checks)
      - orgs/open-hax/openplanner
      - orgs/open-hax/uxx
      # Allow iterating on the workflow itself
      - .github/workflows/knoxx-pr-gate.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  knoxx-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            orgs/open-hax/openplanner/packages/agents/knoxx/pnpm-lock.yaml

      - name: Install (Knoxx workspace)
        run: pnpm -C orgs/open-hax/openplanner/packages/agents/knoxx install --frozen-lockfile

      - name: Backend typecheck (shadow-cljs compile app)
        run: pnpm -C orgs/open-hax/openplanner/packages/agents/knoxx/backend run typecheck

      - name: Backend tests (cljs.test via shadow-cljs)
        run: pnpm -C orgs/open-hax/openplanner/packages/agents/knoxx/backend test

      - name: Frontend typecheck (tsc)
        run: pnpm -C orgs/open-hax/openplanner/packages/agents/knoxx/frontend run typecheck

      - name: Frontend tests (vitest)
        run: pnpm -C orgs/open-hax/openplanner/packages/agents/knoxx/frontend test
