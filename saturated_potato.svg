<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Saturated Gold Potato -->
  <defs>
    <radialGradient id="potatoGrad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" style="stop-color:#dfb36d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a67c3c;stop-opacity:1" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur2"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur2"/>
        <feMergeNode in="original"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- The Potato Body -->
  <path d="M40,100 Q40,50 100,50 Q160,50 160,100 Q160,150 100,150 Q40,150 40,100" 
        fill="url(#potatoGrad)" 
        stroke="#5d4037" 
        stroke-width="4" 
        stroke-linejoin="round" />
  
  <!-- Texture / Eyes -->
  <circle cx="70" cy="80" r="4" fill="#5d4037" opacity="0.6" />
  <circle cx="130" cy="95" r="3" fill="#5d4037" opacity="0.6" />
  <circle cx="100" cy="125" r="4" fill="#5d4037" opacity="0.6" />
  <circle cx="115" cy="75" r="2" fill="#5d4037" opacity="0.6" />
  
  <!-- Gold Leaf Accents -->
  <path d="M60,60 Q80,55 100,60" stroke="#ffd700" stroke-width="2" fill="none" opacity="0.8" />
  <path d="M120,130 Q140,135 150,120" stroke="#ffd700" stroke-width="2" fill="none" opacity="0.8" />
</svg>
