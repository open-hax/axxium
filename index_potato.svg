<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="indexGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f0e68c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bdb76b;stop-opacity:1" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- The Potato Core -->
  <path d="M40,100 Q40,50 100,50 Q160,50 160,100 Q160,150 100,150 Q40,150 40,100" 
        fill="url(#indexGrad)" 
        stroke="#556b2f" 
        stroke-width="2" 
        filter="url(#glow)" />
  
  <!-- "Indexing" Elements -->
  <!-- A small directory tree on the potato surface -->
  <path d="M70,80 L90,80 M90,80 L90,90 M90,80 L110,80 M110,80 L110,90" 
        stroke="#556b2f" stroke-width="1.5" fill="none" />
  <circle cx="70" cy="80" r="2" fill="#556b2f" />
  <circle cx="110" cy="80" r="2" fill="#556b2f" />
  
  <!-- A search magnifying glass -->
  <circle cx="130" cy="120" r="6" stroke="#556b2f" stroke-width="1.5" fill="none" />
  <line x1="135" y1="125" x2="140" y2="130" stroke="#556b2f" stroke-width="1.5" />
  
  <!-- Text: "INDEXING..." -->
  <text x="100" y="105" font-family="monospace" font-weight="bold" font-size="12" fill="#556b2f" text-anchor="middle">
    [ INDEXING... ]
  </text>
  <text x="100" y="120" font-family="monospace" font-size="8" fill="#8b4513" text-anchor="middle">
    SESSIONS: PENDING
  </text>

  <!-- Tiny Potato Eyes (of a very tired potato) -->
  <ellipse cx="75" cy="70" rx="3" ry="1" fill="#8b4513" />
  <ellipse cx="125" cy="70" rx="3" ry="1" fill="#8b4513" />
  <path d="M90,75 Q100,65 110,75" stroke="#8b4513" stroke-width="1" fill="none" />
</svg>
